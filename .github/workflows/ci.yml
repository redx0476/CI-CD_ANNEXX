name: CI

on:
  pull_request:
    branches: [ master, main, develop ]
  push:
    branches: [ master, main, develop ]
  schedule:
    - cron: '0 2 * * 1'  # Run every Monday at 2 AM UTC

env:
  RAILS_ENV: test
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/annexx_test
  ANNEXX_DATABASE_PASSWORD: postgres

jobs:
  # Code Quality and Linting
  code_quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run RuboCop (Code Style & Quality)
        run: |
          bin/rubocop --parallel --format github
          
      - name: Check for code smells with RubyCritic
        run: |
          bundle exec rubycritic --format console --minimum-score 90
          
      - name: Check for Rails best practices
        run: |
          bundle exec rails_best_practices . || echo "Rails best practices check completed"

  # Security Scanning
  security_scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: code_quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for Rails security vulnerabilities (Brakeman)
        run: |
          bin/brakeman --no-pager --format json --output brakeman.json
          bin/brakeman --no-pager --exit-on-warn

      - name: Upload Brakeman results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: brakeman-results
          path: brakeman.json

      - name: Scan for JavaScript security vulnerabilities
        run: bin/importmap audit

      - name: Scan for vulnerable Ruby gems (Bundler Audit)
        run: |
          gem install bundler-audit
          bundle audit check --update

  # Database and Migration Tests
  database_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: code_quality
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: annexx_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Setup Database
        run: |
          bin/rails db:create
          bin/rails db:schema:load

      - name: Run database migrations (forward and rollback)
        run: |
          bin/rails db:migrate
          bin/rails db:rollback STEP=3
          bin/rails db:migrate
          
      - name: Test multi-database setup
        run: |
          bin/rails multi_db:status
          bin/rails db:schema:load:cache
          bin/rails db:schema:load:queue
          bin/rails db:schema:load:cable

      - name: Validate database schema
        run: |
          bin/rails db:schema:dump
          git diff --exit-code db/schema.rb

  # Comprehensive Test Suite
  test_suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [code_quality, database_tests]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: annexx_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Setup Test Database
        run: |
          bin/rails db:create
          bin/rails db:schema:load
          bin/rails multi_db:setup_all

      - name: Run RSpec Tests with Coverage
        run: |
          bundle exec rspec --format documentation --format json --out rspec_results.json

      - name: Run Rails System Tests
        run: |
          bin/rails test:system

      - name: Run Cucumber Features
        run: |
          bundle exec cucumber --format json --out cucumber_results.json

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            rspec_results.json
            cucumber_results.json
            coverage/

  # Performance and Load Testing
  performance_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test_suite]
    if: github.event_name == 'pull_request'
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: annexx_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Setup Database
        run: |
          bin/rails db:create
          bin/rails db:schema:load

      - name: Check for N+1 queries (Bullet)
        run: |
          bin/rails test:performance || echo "Performance tests completed"

      - name: Memory usage analysis
        run: |
          bundle exec derailed exec perf:mem

  # Environment-Specific Tests
  multi_environment_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [test_suite]
    strategy:
      matrix:
        environment: [development, staging, test]
        
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: annexx_${{ matrix.environment }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Test environment configuration
        env:
          RAILS_ENV: ${{ matrix.environment }}
        run: |
          ./bin/env-switch ${{ matrix.environment }}
          bin/rails runner "puts 'Environment: #{Rails.env} loaded successfully'"

      - name: Test multi-database setup for environment
        env:
          RAILS_ENV: ${{ matrix.environment }}
          ANNEXX_STAGING_DATABASE_PASSWORD: postgres
        run: |
          if [ "${{ matrix.environment }}" != "production" ]; then
            RAILS_ENV=${{ matrix.environment }} bin/rails db:create
            RAILS_ENV=${{ matrix.environment }} bin/rails multi_db:status
          fi

  # Final Security and Compliance Check
  final_security_check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [security_scan, test_suite]
    if: github.event_name == 'pull_request' && github.base_ref == 'master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Final security audit
        run: |
          bin/brakeman --exit-on-warn --run-all-checks
          
      - name: Check for hardcoded secrets
        run: |
          ! grep -r -i "password\|secret\|key\|token" --include="*.rb" --include="*.yml" --exclude-dir=".git" . | grep -v "ENV\|Rails.application.credentials" || exit 1

      - name: Verify no database passwords in code
        run: |
          ! grep -r "password.*=" --include="*.rb" --include="*.yml" . | grep -v "ENV" || exit 1

  # Deployment Readiness Check
  deployment_check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [multi_environment_tests, final_security_check]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Precompile assets (production simulation)
        env:
          RAILS_ENV: production
          SECRET_KEY_BASE: dummy_key_for_assets
        run: |
          bin/rails assets:precompile

      - name: Check for missing environment variables
        run: |
          echo "Checking required environment variables..."
          bin/rails runner "
            required_vars = %w[DATABASE_USERNAME ANNEXX_DATABASE_PASSWORD SECRET_KEY_BASE]
            missing = required_vars.select { |var| ENV[var].nil? || ENV[var].empty? }
            puts missing.any? ? 'Missing: #{missing.join(\", \")}' : 'All required vars configured'
          "

  # Notification and Summary
  ci_summary:
    runs-on: ubuntu-latest
    if: always()
    needs: [code_quality, security_scan, database_tests, test_suite, multi_environment_tests]
    
    steps:
      - name: CI Summary
        run: |
          echo "## 🚀 CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Code Quality**: ${{ needs.code_quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security Scan**: ${{ needs.security_scan.result }}" >> $GITHUB_STEP_SUMMARY  
          echo "- **Database Tests**: ${{ needs.database_tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Suite**: ${{ needs.test_suite.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Multi-Environment**: ${{ needs.multi_environment_tests.result }}" >> $GITHUB_STEP_SUMMARY

